<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sliding Tiles Puzzle</title>
<style>
    body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
    }

    #controls {
        margin-bottom: 15px;
    }

    #puzzle {
        position: relative;
        width: 100vmin;
        height: 100vmin;
		max-width: 100%;
		max-height: 100%;
        border: 2px solid black;
        overflow: hidden;
        user-select: none;
        touch-action: none;
    }

    .tile {
        position: absolute;
        /* border: 0.5px solid black; */
		border: none;
		box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.4);
		
        box-sizing: border-box;
        background-size: 100% 100%;
    }

    .ghost {
        pointer-events: none;
    }

    #dropzone {
        width: 500px;
        height: 40px;
        border: 2px dashed #666;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
        color: #444;
    }
</style>
</head>
<body>

<div id="controls">
    <label>Grid size:
        <select id="gridSize">
            <option value="3">3 × 3</option>
            <option value="4">4 × 4</option>
        </select>
    </label>
    <input type="file" id="fileInput" accept="image/*">
	<button id="scrambleBtn">Scramble</button>

</div>

<div id="dropzone">Drag & Drop Image Here</div>

<canvas id="sourceCanvas" style="display:none;"></canvas>
<div id="puzzle"></div>

<script>
let grid = 3;
let tileSize = 0;
let tiles = [];
let img = new Image();

const puzzle = document.getElementById("puzzle");
const gridSelect = document.getElementById("gridSize");
const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");
const sourceCanvas = document.getElementById("sourceCanvas");
const ctx = sourceCanvas.getContext("2d");

gridSelect.addEventListener("change", () => {
    grid = parseInt(gridSelect.value);
    if (img.src) buildPuzzle();
});

fileInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (file) loadImageFile(file);
});

dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.style.background = "#eef";
});
dropzone.addEventListener("dragleave", () => {
    dropzone.style.background = "";
});
dropzone.addEventListener("drop", e => {
    e.preventDefault();
    dropzone.style.background = "";
    const file = e.dataTransfer.files[0];
    if (file) loadImageFile(file);
});

window.addEventListener("resize", resizePuzzle);
resizePuzzle();


document.getElementById("scrambleBtn").onclick = () => {
    if (!img.src) return; // no picture loaded

    for (let i = 0; i < 20; i++) {
        const isRow = Math.random() < 0.5;
        const index = Math.floor(Math.random() * grid);
        const direction = Math.random() < 0.5 ? 1 : -1;

        if (isRow) {
            scrambleRow(index, direction);
        } else {
            scrambleCol(index, direction);
        }
    }

    // After scrambling, update tile positions visually
    tiles.forEach(tile => {
        tile.style.left = (tile.dataset.col * tileSize) + "px";
        tile.style.top = (tile.dataset.row * tileSize) + "px";
    });
};

function scrambleRow(r, dir) {
    tiles.forEach(tile => {
        if (parseInt(tile.dataset.row) === r) {
            const oldC = parseInt(tile.dataset.col);
            const newC = (oldC + dir + grid) % grid;
            tile.dataset.col = newC;
        }
    });
}

function scrambleCol(c, dir) {
    tiles.forEach(tile => {
        if (parseInt(tile.dataset.col) === c) {
            const oldR = parseInt(tile.dataset.row);
            const newR = (oldR + dir + grid) % grid;
            tile.dataset.row = newR;
        }
    });
}


function loadImageFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        img.onload = () => buildPuzzle();
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function buildPuzzle() {
    puzzle.innerHTML = "";
    tiles = [];

    tileSize = puzzle.clientWidth / grid;

    sourceCanvas.width = puzzle.clientWidth;
    sourceCanvas.height = puzzle.clientHeight;
    ctx.drawImage(img, 0, 0, sourceCanvas.width, sourceCanvas.height);

    for (let r = 0; r < grid; r++) {
        for (let c = 0; c < grid; c++) {
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.width = tileSize + "px";
            tile.style.height = tileSize + "px";
            tile.style.left = (c * tileSize) + "px";
            tile.style.top = (r * tileSize) + "px";

            const tileCanvas = document.createElement("canvas");
            tileCanvas.width = tileSize;
            tileCanvas.height = tileSize;
            const tctx = tileCanvas.getContext("2d");
            tctx.drawImage(
                sourceCanvas,
                c * tileSize, r * tileSize, tileSize, tileSize,
                0, 0, tileSize, tileSize
            );
            tile.style.backgroundImage = `url(${tileCanvas.toDataURL()})`;

            tile.dataset.row = r;
            tile.dataset.col = c;

            puzzle.appendChild(tile);
            tiles.push(tile);
        }
    }

    enableDragging();
}

function resizePuzzle() {
    const size = Math.min(window.innerWidth, window.innerHeight - 150); 
    puzzle.style.width = size + "px";
    puzzle.style.height = size + "px";

    if (img.src) rescaleTiles(); // rebuild tiles at new size
}

function rescaleTiles() {
    tileSize = puzzle.clientWidth / grid;

    tiles.forEach(tile => {
        const r = parseInt(tile.dataset.row);
        const c = parseInt(tile.dataset.col);

        tile.style.width = tileSize + "px";
        tile.style.height = tileSize + "px";
        tile.style.left = (c * tileSize) + "px";
        tile.style.top = (r * tileSize) + "px";
    });
}


// Drag state
let dragging = false;
let dragStart = null;
let dragAxis = null;
let dragIndex = null;
let dragDeltaX = 0;
let dragDeltaY = 0;
let ghosts = [];

function enableDragging() {
    puzzle.onmousedown = startDrag;
    puzzle.onmousemove = dragMove;
    puzzle.onmouseup = endDrag;
    puzzle.onmouseleave = endDrag;
}

function startDrag(e) {
    const tile = e.target.closest(".tile");
    if (!tile) return;

    dragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragIndex = { row: parseInt(tile.dataset.row), col: parseInt(tile.dataset.col) };
    dragAxis = null;
    dragDeltaX = 0;
    dragDeltaY = 0;

    tiles.forEach(t => {
        t.dataset.baseLeft = t.style.left;
        t.dataset.baseTop = t.style.top;
    });

    clearGhosts();
}

function dragMove(e) {
    if (!dragging) return;

    dragDeltaX = e.clientX - dragStart.x;
    dragDeltaY = e.clientY - dragStart.y;

    // Direction lock with bias
    if (!dragAxis) {
        if (Math.abs(dragDeltaX) > Math.abs(dragDeltaY) + 12) {
            dragAxis = "row";
            createRowGhosts(dragIndex.row);
        } else if (Math.abs(dragDeltaY) > Math.abs(dragDeltaX) + 12) {
            dragAxis = "col";
            createColGhosts(dragIndex.col);
        } else {
            return;
        }
    }

    if (dragAxis === "row") slideRow(dragIndex.row, dragDeltaX);
    else slideCol(dragIndex.col, dragDeltaY);
}

function endDrag(e) {
    if (!dragging) return;
    dragging = false;

    if (dragAxis === "row") snapRow(dragIndex.row, dragDeltaX);
    else if (dragAxis === "col") snapCol(dragIndex.col, dragDeltaY);

    clearGhosts();
}

// Ghost management
function clearGhosts() {
    ghosts.forEach(g => g.remove());
    ghosts = [];
}

function createRowGhosts(r) {
    const width = grid * tileSize;
    tiles.forEach(tile => {
        if (parseInt(tile.dataset.row) === r) {
            const baseLeft = parseInt(tile.style.left);

            const g1 = tile.cloneNode(true);
            g1.classList.add("ghost");
            g1.style.left = (baseLeft - width) + "px";
            g1.dataset.baseLeft = g1.style.left;
            g1.dataset.baseTop = tile.style.top;
            puzzle.appendChild(g1);

            const g2 = tile.cloneNode(true);
            g2.classList.add("ghost");
            g2.style.left = (baseLeft + width) + "px";
            g2.dataset.baseLeft = g2.style.left;
            g2.dataset.baseTop = tile.style.top;
            puzzle.appendChild(g2);

            ghosts.push(g1, g2);
        }
    });
}

function createColGhosts(c) {
    const height = grid * tileSize;
    tiles.forEach(tile => {
        if (parseInt(tile.dataset.col) === c) {
            const baseTop = parseInt(tile.style.top);

            const g1 = tile.cloneNode(true);
            g1.classList.add("ghost");
            g1.style.top = (baseTop - height) + "px";
            g1.dataset.baseTop = g1.style.top;
            g1.dataset.baseLeft = tile.style.left;
            puzzle.appendChild(g1);

            const g2 = tile.cloneNode(true);
            g2.classList.add("ghost");
            g2.style.top = (baseTop + height) + "px";
            g2.dataset.baseTop = g2.style.top;
            g2.dataset.baseLeft = tile.style.left;
            puzzle.appendChild(g2);

            ghosts.push(g1, g2);
        }
    });
}

// Continuous wrap with ghosts
function slideRow(r, dx) {
    function moveTile(t) {
        const base = parseInt(t.dataset.baseLeft);
        const pos = base + dx;
        t.style.left = pos + "px";
    }

    tiles.forEach(tile => {
        if (parseInt(tile.dataset.row) === r) moveTile(tile);
    });
    ghosts.forEach(g => moveTile(g));
}

function slideCol(c, dy) {
    function moveTile(t) {
        const base = parseInt(t.dataset.baseTop);
        const pos = base + dy;
        t.style.top = pos + "px";
    }

    tiles.forEach(tile => {
        if (parseInt(tile.dataset.col) === c) moveTile(tile);
    });
    ghosts.forEach(g => moveTile(g));
}

// Snap (instant, no animation, same wrap logic)
function snapRow(r, dx) {
    const shift = Math.round(dx / tileSize);

    tiles.forEach(tile => {
        if (parseInt(tile.dataset.row) === r) {
            const oldC = parseInt(tile.dataset.col);
            const newC = (oldC + shift + grid) % grid;
            tile.dataset.col = newC;
            tile.style.left = (newC * tileSize) + "px";
        } else {
            tile.style.left = tile.dataset.baseLeft;
        }
    });
}

function snapCol(c, dy) {
    const shift = Math.round(dy / tileSize);

    tiles.forEach(tile => {
        if (parseInt(tile.dataset.col) === c) {
            const oldR = parseInt(tile.dataset.row);
            const newR = (oldR + shift + grid) % grid;
            tile.dataset.row = newR;
            tile.style.top = (newR * tileSize) + "px";
        } else {
            tile.style.top = tile.dataset.baseTop;
        }
    });
}


</script>

</body>
</html>
